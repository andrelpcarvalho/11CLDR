name: pipeline

on:
  push:
  workflow_dispatch:

jobs:        
  unit-test: 
    runs-on: ubuntu-latest
    steps: 
    - uses: actions/checkout@v6 
      with: 
        fetch-depth: 0
    - run: mvn test 
    - name: Generate JaCoCo Badge 
      id: jacoco
      uses: cicirello/jacoco-badge-generator@v2.11.0
    - name: Log coverage percentage 
      run: |
        echo "coverage = ${{ steps.jacoco.outputs.coverage }}"
        echo "branch coverage = ${{ steps.jacoco.outputs.branches }}" 
    - name: Upload JaCoCo coverage report 
      uses: actions/upload-artifact@v7
      with: 
        name: jacoco-report 
        path: target/site/jacoco/
  
  SAST:
    runs-on: ubuntu-latest
    needs: unit-test
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@master

      - name: Set up Snyk CLI to check for security issues
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb
        with:
          snyk-version: v1.1295.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code test (SAST)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --sarif-file-output=snyk-code.sarif

      - name: Upload Snyk Code SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Run Snyk to check for vulnerabilities (SCA)
        uses: snyk/actions/maven@8e119fbb6c251787721d34ba683ed48eba792766 # master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif

      - name: Upload Snyk SCA SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif
          category: snyk-sca

  code-analisys:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar
          -Dsonar.projectKey=andrelpcarvalho_11CLDR
          -Dsonar.organization=andrelpcarvalho
          -Dsonar.qualitygate.wait=false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_11_CLDR }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build: 
    runs-on: ubuntu-latest
    needs: code-analisys
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Build with Maven
      run: mvn -B package -DskipTests --file pom.xml      
    - name: Display structure of downloaded files
      run: ls -R
      working-directory: target/
   
    - name: Upload JAR
        #This uploads artifacts from your workflow allowing you to share data between jobs and store data once a workflow is complete.
      uses: actions/upload-artifact@v7
      with:
        #Set artifact name
        name: artifact
        #From this path
        path: ./target/demo-0.0.2.7-SNAPSHOT.jar
    
    - name: Package
      run: mvn package
  
  deploy-Pre:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/release'
    needs: build
    steps:
      - name: Deploy 
        shell: bash
        run: |
          echo "Deploy PRE"
          
  smoketestPre: 
    runs-on: ubuntu-latest 
    needs: deploy-Pre
    if: github.ref == 'refs/heads/release' 
    steps: 
    - uses: actions/checkout@v6
    - name: Deploy 
      shell: bash 
      run: | 
        sh 'src/main/scripts/smoketest.sh' 
      
  testeFuncionais: 
    runs-on: ubuntu-latest 
    needs: smoketestPre
    if: github.ref == 'refs/heads/release'
    steps: 
    - uses: actions/checkout@v6
    - name: Deploy 
      shell: bash
      run: |
        sh 'src/main/scripts/testesFuncionais.sh' 
  
  testePerformance: 
    runs-on: ubuntu-latest 
    needs: testeFuncionais
    if: github.ref == 'refs/heads/release'
    steps: 
      - uses: actions/checkout@v6
      - name: Deploy 
        shell: bash
        run: |
          sh 'src/main/scripts/testePerformance.sh'

  deploy-STG:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Deploy 
        shell: bash
        run: |
          echo "Deploy STG"

  Smoketest: 
    runs-on: ubuntu-latest
    needs: deploy-STG
    if: github.ref == 'refs/heads/develop'
    steps: 
      - uses: actions/checkout@v6
      - name: Deploy 
        shell: bash 
        run: |
          sh 'src/main/scripts/smoketest.sh'

  testeIntegrados: 
    runs-on: ubuntu-latest 
    needs: Smoketest
    if: github.ref == 'refs/heads/develop' 
    steps: 
      - uses: actions/checkout@v6
      - name: Deploy 
        shell: bash
        run: |
          sh 'src/main/scripts/testeIntegrado.sh'

  deploy-PROD:
      runs-on: ubuntu-latest
      needs: build
      if: github.ref == 'refs/heads/main'
      steps:
        - name: Deploy 
          shell: bash
          run: |
            echo "Deploy PROD"

  smokeTestProd: 
    runs-on: ubuntu-latest
    needs: deploy-PROD
    if: github.ref == 'refs/heads/main'
    steps: 
      - uses: actions/checkout@v6
      - name: Deploy 
        shell: bash 
        run: |
          sh 'src/main/scripts/smoketest.sh'

  testeProdPerformance: 
      runs-on: ubuntu-latest 
      needs: smokeTestProd
      if: github.ref == 'refs/heads/main' 
      steps: 
        - uses: actions/checkout@v6
        - name: Deploy 
          shell: bash
          run: |
            sh 'src/main/scripts/testesPerformance.sh'
  
  deploy-azure:
      runs-on: ubuntu-latest
      needs: build
      name: Deploy-azure
      if: github.ref == 'refs/heads/main' 
      environment:
        name: Deploy-azure
        url: https://devopsfiap-on-app-rm368115-gyc7dgdja5e8dva7.canadacentral-01.azurewebsites.net
      steps:
        - name: Download JAR
          uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
          with:
            name: artifact
            path: target/
        - name: DeployAzure 
          uses: azure/webapps-deploy@5cfb776471c748b351e1ebf5770e208a54ace016 # v2.2.19
          with:
            app-name: DevopsFiap-On-App-rm368115
            publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
            package: '${{ github.workspace }}/target/*.jar'